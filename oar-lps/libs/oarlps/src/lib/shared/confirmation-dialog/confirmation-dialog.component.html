<div class="modal-header dialogHeader center">
    <h4>{{ title }}</h4>
</div>
<div class="modal-body center">
    <!-- <i 
        *ngIf="showWarningIcon" 
        class="faa faa-warning faa-2x warning-icon">
    </i> -->
    <fa-icon 
        [icon]="faTriangleExclamation" 
        size="x2">
    </fa-icon>
    <span [innerHTML]="message"></span>
</div>
<div class="modal-footer center">
    <button 
        type="button" 
        id="cd-ok-button" 
        (click)="accept()">
        {{ btnOkText }}
    </button>

    <button 
        *ngIf="showCancelButton" 
        type="button" 
        id="cd-cancel-button" 
        (click)="decline()">
        {{ btnCancelText }}
    </button>
</div>
