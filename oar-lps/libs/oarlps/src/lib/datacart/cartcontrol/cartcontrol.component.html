<div *ngIf="inBrowser" class="top-banner" [ngStyle]="{ 'background-image': 'url(' + imageURL + ')'}">
    <div class="inner-box">
        <span style="font-size: xx-large;" class="top-banner-text">
            <!-- <i class="faa faa-cloud-download faa-lg" style="padding-right: .5em;text-shadow: 1px 1px 2px darkgrey;"></i> -->
            <fa-icon [icon]="faCloudDownload" style="padding-right: .5em;text-shadow: 1px 1px 2px darkgrey; scale: 2;"></fa-icon>
            <label>Download Manager</label>
        </span>

        <!-- Control buttons for large screen -->
        <div class="control-btns" *ngIf="screenWidth > screenSizeBreakPoint" style="float: right;">
            <button 
                type="button" 
                class="btn-labeled cbtn"
                (click)="downloadSelected()" 
                [disabled]="selectedFileCount==0"
                id="cc-download-btn" 
                >
                <!-- <i class="fas fa-trash-alt faa-1x icon-white" style="color: #fff; margin-right: 10px;"></i> -->
                <fa-icon [icon]="faDownload" style="margin-right: 10px;"></fa-icon>
                <span style="margin-right: 10px;">Download Selected</span>
                <p-badge [value]="selectedFileCount"></p-badge>
            </button>

            <button 
                (click)="removeDownloaded()" 
                type="submit"
                class="btn-labeled cbtn"
                id="cc-remove-downloaded-btn" 
                [disabled]="!anyDownloaded()">
                <!-- <i class="fas fa-trash-alt faa-1x icon-white" style="color: #fff; margin-right: 10px;"></i> -->
                <fa-icon [icon]="faTrash" style="margin-right: 10px;"></fa-icon>
                Remove downloaded
                <p-badge [value]="totalDownloaded"></p-badge>
            </button>

            <button 
                (click)="removeSelected()" 
                type="submit"
                class="btn-labeled cbtn"
                id="cc-remove-selected-btn"
                [disabled]="selectedFileCount==0">
                <!-- <i class="fas fa-trash-alt faa-1x icon-white" style="color: #fff; margin-right: 10px;"></i> -->
                <fa-icon [icon]="faTrashCan" style="margin-right: 10px;"></fa-icon>
                Remove selected
                <p-badge [value]="selectedFileCount"></p-badge>
            </button>
        </div>
    </div>
</div>

<div class="full-span" *ngIf="screenWidth <= screenSizeBreakPoint">
    <div class="control-btns">
        <button (click)="downloadSelected()" 
            type="submit"
            class="btn-labeled"
            [ngStyle]="{'width':'max-content','height':'2.5em','background-color':'#307F38'}"
            [disabled]="selectedFileCount==0">
            <!-- <i class="fas fa-download faa-1x icon-white" style="color: #fff; margin-right: 10px;"></i> -->
            <fa-icon [icon]="faDownload" style="margin-right: 10px;"></fa-icon>
            Download Selected
            <p-badge [value]="selectedFileCount"></p-badge>
        </button>

        <button (click)="removeDownloaded()" 
            type="submit"
            class="btn-labeled"
            style="margin-left:1em;width:max-content; height:2.5em; background-color:rgb(82, 82, 82);"
            [disabled]="!anyDownloaded()">
            <!-- <i class="fas fa-trash-alt faa-1x icon-white" style="color: #fff; margin-right: 10px;"></i> -->
            <fa-icon [icon]="faTrash" style="margin-right: 10px;"></fa-icon>
            Remove downloaded
            <p-badge [value]="totalDownloaded"></p-badge>
        </button>

        <button (click)="removeSelected()" 
            type="submit"
            class="btn-labeled"
            style="margin-left:1em;width:max-content; height:2.5em; background-color:rgb(82, 82, 82);"
            [disabled]="selectedFileCount==0">
            <!-- <i class="fas fa-trash-alt faa-1x icon-white" style="color: #fff; margin-right: 10px;"></i> -->
            <fa-icon [icon]="faTrashCan" style="margin-right: 10px;"></fa-icon>
            Remove selected
            <p-badge [value]="selectedFileCount"></p-badge>
        </button>
    </div>
</div>
