<div class="table-wraper">
    <table width="100%">
        <tr style="width: 100% !important;">
            <!-- Drag drop icon -->
            <td *ngIf="dragDropIcon" class="dragdrop">
                <img src="./assets/images/reorder.png" class="dragdropicon" [style.opacity]="iconOpacity()" ngbTooltip="Drag and re-position this item" alt="Drag and re-position this item">
            </td>

            <!-- Text field -->
            <td class="text-field-wrapper">
                <input class="editable-text-field" *ngIf="editing" type="text" [(ngModel)]="currentVal" [placeholder]="placeHolderText"/>
                <span *ngIf="!editing" class="display-text-field">
                    <div style="padding: 2px 10px;" *ngIf="currentVal && currentVal.trim() != ''; else notext">{{ currentVal }}</div>
                    <ng-template #notext>
                        <span style="color: grey;">{{placeHolderText}}</span>
                    </ng-template>
                    
                </span>
            </td>

            <!-- Controls -->
            <td class="control-wrapper" [style.width]="controlBoxWidth" [style.border-left]="controlBorderStyle()">
                <!-- Edit/Save button-->
                <button 
                    *ngIf="editButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="editSave()" 
                    [disabled]="disableControl" 
                    [aria-label]="getTooltip('edit')"
                    [pTooltip]="getTooltip('edit')"
                    tooltipPosition="top" >
                    <i [class]="getEditIconClass()" [style.opacity]="iconOpacity()"
                        data-toggle="tooltip" [title]="getTooltip('edit')"></i>
                </button>

                <!-- Custom button -->
                <button 
                    *ngIf="customButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="cust();" 
                    [disabled]="disableControl" 
                    [aria-label]="custBtnTooltip"
                    [pTooltip]="custBtnTooltip"
                    tooltipPosition="top" >
                    <i [class]="custBtnIcon" [style.opacity]="iconOpacity()"></i>
                </button>

                <!-- Edit only button-->
                <button 
                    *ngIf="editOnlyButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="edit()" 
                    [disabled]="editing || disableControl" 
                    aria-label="Edit button" 
                    pTooltip="Edit this item"
                    tooltipPosition="top" >
                    <i [class]="getEditOnlyIconClass()" [style.opacity]="iconOpacity(editing)"
                        data-toggle="tooltip" [title]="getTooltip('edit')"></i>
                </button>

                <!-- Delete/undoEdit button-->
                <button 
                    *ngIf="deleteButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="removeUndo()" 
                    [disabled]="disableControl" 
                    [aria-label]="getTooltip('delete')"
                    [pTooltip]="getTooltip('delete')"
                    tooltipPosition="top">
                    <i [class]="getDelIconClass()" [style.opacity]="iconOpacity()"
                        data-toggle="tooltip" [title]="getTooltip('delete')"></i>
                </button>

                <!-- Restore button-->
                <button 
                    *ngIf="restoreButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="restore()" 
                    [disabled]="disableControl || !dataChanged || isNew || editing" 
                    aria-label="Restore button" 
                    pTooltip="Restore from original value" 
                    data-container="body"
                    tooltipPosition="top">
                    <i class="fas fa-undo fa-sm" [style.opacity]="iconOpacity(editing)"
                        data-toggle="tooltip" [title]="getTooltip('restore')"></i>
                </button>

                <!-- Plus button-->
                <button 
                    *ngIf="plusButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="add()" 
                    [disabled]="disableControl" 
                    aria-label="Add button" 
                    pTooltip="Add new item"
                    tooltipPosition="top">
                    <i class="faa faa-plus" [style.opacity]="iconOpacity()"
                        data-toggle="tooltip" [title]="Add"></i>
                </button>

                <!-- Submit button-->
                <button 
                    *ngIf="submitButton" 
                    class="edit_button" 
                    type="button" 
                    (click)="submit()" 
                    [disabled]="disableControl" 
                    aria-label="submit button" 
                    [pTooltip]="submitTooltip"
                    tooltipPosition="top">
                    <i class="faa faa-check-circle" [style.opacity]="iconOpacity()"
                        data-toggle="tooltip" [title]="submit"></i>
                </button>
            </td>
        </tr>
    </table>
</div>
