<!-- Go To menu-->
<table style="width: 100%;">
    <tr *ngFor="let menuitem of gotoMenu">
        <td [ngClass]="menuitem.isHeader? 'menu-header menu-body' : 'menu-item menu-body'" scope="row"
            [ngStyle]="menuStyle(menuitem)"
            (click)="goToSection(menuitem.sectionName, menuitem.url)">
            <fa-icon *ngIf="menuitem.icon" [icon]="['fas', menuitem.icon]" size="xs"></fa-icon>
            {{menuitem.title}}
        </td>
    </tr>
</table>

<!-- Use menu-->
<table style="width: 100%;">
    <tr *ngFor="let menuitem of useMenu">
        <!-- <td [ngClass]="menuitem.isHeader? 'menu-header menu-body' : 'menu-item menu-body'" scope="row"
            [style.--background-default]="menuitem.isHeader? defaultColor: lighterColor"
            [style.--background-lighter]="lighterColor" 
            [style.--background-hover]="hoverColor"
            (click)="goToSection(menuitem.sectionName, menuitem.url)">
            <i [class]="menuitem.icon"></i>
            {{menuitem.title}}
        </td> -->
        <td [ngClass]="menuitem.isHeader? 'menu-header menu-body' : 'menu-item menu-body'" scope="row"
            [ngStyle]="menuStyle(menuitem)"
            (click)="goToSection(menuitem.sectionName, menuitem.url)">
            <fa-icon *ngIf="menuitem.icon" [icon]="['fas', menuitem.icon]" size="xs"></fa-icon>
            {{menuitem.title}}
        </td>
    </tr>
    <tr *ngIf="hasDataFiles">
        <td class="menu-item menu-body" scope="row" 
            [ngStyle]="menuStyle(bulkDownloadMenu)">
            @if(bulkDownloadMenu.url) {
                <a href="{{bulkDownloadMenu.url}}" target="_blank">
                    <fa-icon [icon]="['fas', bulkDownloadMenu.icon]" size="xs"></fa-icon>
                    Bulk Download
                </a>
            } @else {
                <fa-icon [icon]="['fas', bulkDownloadMenu.icon]" size="xs"></fa-icon>
                Bulk Download
            }

        </td>
    </tr>
</table>

<!-- Find menu-->
<table style="width: 100%;">
    <tr *ngFor="let menuitem of findMenu">
        <td [ngClass]="menuitem.isHeader? 'menu-header menu-body' : 'menu-item menu-body'" scope="row"
            [ngStyle]="menuStyle(menuitem)"
            (click)="goToSection(menuitem.sectionName, menuitem.url)">
            <fa-icon *ngIf="menuitem.icon" [icon]="['fas', menuitem.icon]" size="xs"></fa-icon>
            {{menuitem.title}}
        </td>
    </tr>
</table>

<!-- Metrics info-->
<app-metricsinfo 
    *ngIf="theme != scienceTheme" 
    [inBrowser]="inBrowser" 
    [record]="record"
    [collection]="collection"
    [metricsData]="metricsData" 
    [showMetrics]="showMetrics">
</app-metricsinfo>
