@if(inBrowser){
    <div style="display: table;">
        <div class="editable_container">
            @if(hasVisitHomeURL) {
                <a href={{record[fieldName]}} target="_blank">
                    <button type="button" 
                            class="oar-button home_button" 
                            [ngStyle]="visitHomePageBtnStyle()"
                            (click)="googleAnalytics(record.landingPage, $event, 'Resource title: '+record.title)">
                    
                        <fa-icon 
                            *ngIf="arrowUpRightFromSquareIcon" 
                            [icon]="['fas', arrowUpRightFromSquareIcon]" 
                            style="padding-right: .5em;">
                        </fa-icon>
                        Visit Home Page
                    </button>
                </a>
            }
            @else if(!isPublicSite){
                    <button type="button" 
                            disabled=true
                            class="oar-button home_button"
                            [ngStyle]="visitHomePageBtnStyle()">

                        <!-- <i class="fas fa-external-link-alt" pButtonIcon
                            style="padding-right: .5em;"></i> -->
                        <fa-icon *ngIf="arrowUpRightFromSquareIcon" 
                            [icon]="['fas', arrowUpRightFromSquareIcon]" 
                            style="padding-right: .5em;"></fa-icon>
                            Visit Home Page
                    </button>
            }
        </div>
    </div>
}
@else {
    Visit Home Page
}
