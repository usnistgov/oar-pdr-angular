<!-- When editEnabled is true, there are two modes: edit mode and preview mode. 
     This is defined by isEditMode (boolean).
     In edit mode, there are also two modes: editing and non-editing.
     This is defined by isEditing variable (boolean).

     The textarea box only shows up when isEditng = true. Otherwise display text.

     The pencil button only show up when isEditMode is true and isEditing = false.
     Other edit buttons show up when isEditing is true.
  -->
<div style="width: 100%;">
    <div style="display: table; margin-bottom: 0em;width:100%;">
        <div class="editable_container no-wrap" style="width:100%;">
            <div class="editable_field red-star" *ngIf="isEditMode">
                *
            </div>

            @if(isEditing) {
                <div class="editable_field normal-wrap" [ngStyle]="titleWidth">
                    <h2 style="width: 100%;">
                        <textarea #title autocomplete="off" [(ngModel)]='record.title' [placeholder]="placeholder" (ngModelChange)="setBackground($event)" [ngStyle]="mdupdsvc.getFieldStyle(fieldName, dataChanged)" style="width: 100%;cursor: text;" libTextareaAutoresize></textarea>
                    </h2>
                </div>
            }
            @else {
                <div class="editable_field normal-wrap" (click)="startEditing()" style="width: fit-content;" [ngStyle]="mdupdsvc.getFieldStyle(fieldName, false, undefined, false)">
                    @if(record['title']) {
                        <span ><h2>{{record.title}}</h2></span>
                    }
                    @else {
                        <span style="color: var(--disabled-grey-text);">{{placeholder}}</span>
                    }
                </div>
            }
  
            <!-- Control buttons -->
            @if(isEditMode) {
                <div *ngIf="isEditMode" class="editable_field" style="white-space: nowrap;">
                    @if(!isEditing) {
                        <button 
                            class="edit_button" 
                            type="button"
                            (click)="startEditing()" 
                            aria-label="Edit title" 
                            ngbTooltip="Edit title"
                            style="cursor: pointer">

                            <fa-icon [icon]="faPencil" size="sm"></fa-icon>
                        </button> 

                        @if( dataChanged && updated ) {
                            <!-- Restore button, restore original value -->
                            <button 
                                class="edit_button" 
                                type="button" 
                                [disabled]="!updated" 
                                (click)="restoreOriginal()" 
                                aria-label="Restore button" 
                                ngbTooltip="Restore original title">

                                <fa-icon [icon]="faUndo"></fa-icon>
                            </button> 
                        }
                    }
                    @else {
                        <!-- Save button -->
                        <button 
                            class="edit_button" 
                            type="button" 
                            [disabled]="!dataChanged"
                            (click)="onSave()"
                            aria-label="save button" 
                            ngbTooltip="Save changes">

                            <fa-icon 
                                [class]="iconClass('save')"
                                [icon]="faSave">
                            </fa-icon>
                        </button>

                        <!-- Cancel editing button: cancel current changes -->
                        <button 
                            *ngIf="(isEditing || isAdding) && dataChanged"
                            class="edit_button" 
                            type="button"
                            (click)="cancelEditing()" 
                            aria-label="undo button" 
                            ngbTooltip="Cancel edit">
                            <fa-icon 
                                [icon]="faUndo" 
                                data-toggle="tooltip" 
                                title="Cancel edit">
                            </fa-icon>
                        </button>   

                        <!-- Closebutton - hide edit block -->
                        <button 
                            class="edit_button" 
                            *ngIf="isEditing || isAdding" 
                            [disabled]="dataChanged"
                            type="button" 
                            (click)="hideEditBlock()"
                            aria-label="Hide edit block" 
                            pTooltip="Hide edit block" 
                            tooltipPosition="top">
                            <fa-icon 
                                [icon]="faXmark" 
                                [class]="iconClass('close')">
                            </fa-icon>
                        </button>
                    }
                </div>
            }
        </div>
    </div>  
</div>
