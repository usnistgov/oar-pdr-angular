<!-- Edit mode -->
@if(isEditMode) {
    <div class="editable_container">
        <!-- <ng-template #hasReferences> -->
        <div class="editable_field" style="max-width: calc(100% - 70px); margin-right: 5px;">
            <div 
                *ngIf="isEditMode"  
                [ngStyle]="mdupdsvc.getFieldStyle(fieldName, dataChanged, undefined, isEditing)" 
                style="margin-bottom: 10px; padding-left: 10px;">

                <div *ngIf="!record['references'] || record['references'].length==0; else hasReferences">
                    Add references to papers and other datasets.
                </div>
                <ng-template #hasReferences>
                    Edit references:
                </ng-template>
            </div>

            <ref-pub [record]="record" ></ref-pub>
        </div>        
        <!-- </ng-template> -->
        
        <!-- Control buttons -->
        <div class="editable_field" *ngIf="isEditMode" style="white-space: nowrap;width: 1.65em;">
            <button 
                class="edit_button" 
                *ngIf="!childIsEditing && !childIsAdding && !isListing" 
                type="button" 
                (click)="startEditing()" 
                aria-label="Edit reference"
                pTooltip="Edit reference" 
                tooltipPosition="top" 
                style="cursor: pointer">
                <fa-icon [icon]="faPencil" size="sm"></fa-icon>
            </button> 

            <!-- Undo all changes button -->
            <button #undo 
                class="edit_button" 
                *ngIf="refChanged || refUpdated" 
                [disabled]="childIsEditing || childIsAdding" 
                type="button"
                (click)="undoAllChanges()" 
                aria-label="Undo" 
                pTooltip="Undo"
                tooltipPosition="top" >
                <fa-icon [icon]="faUndo" size="sm"></fa-icon>
            </button>                
        </div>
    </div>
}
<!-- preview mode -->
<!-- <ng-template #nonEdit> -->
@else{
    <ref-pub [record]="record" ></ref-pub>
}

<!-- Defer block for lazyloading
    The components inside the block must be stand alone component.
    This block will only be loaded when loadEditRefBlock is set to true.
-->
@if (loadEditRefBlock) {
    <div style="width: 100%;" [@editExpand]="editBlockExpanded" [style.overflow] = "overflowStyle">
        <lib-ref-list 
            #reflist [nerdmRecord]="record" 
            [inBrowser]="inBrowser" 
            [loadEditRefBlock]="loadEditRefBlock"
            (dataCommand)="onRefChange($event)" 
            (editmodeOutput)="setChildEditMode($event)"></lib-ref-list>
    </div>
}
