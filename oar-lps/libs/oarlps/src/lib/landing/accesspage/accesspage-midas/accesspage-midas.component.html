<accesspage-pub [record]="record" [theme]="theme" [isPublicSite]="isPublicSite">
    <div class="message" style="margin-right: 10px;">
        @if(isEditMode) {
            Add links to relevant websites including software repositories.
        }
    </div>

    <!-- Control buttons -->
    <div class="controls" style="white-space: nowrap;">
        @if(isEditMode) {
            @if(isNormal) {
                <!-- Edit button -->
                <button
                    class="edit_button"
                    (click)="startEditing()" 
                    aria-label="edit button"
                    pTooltip="Edit access page"
                    tooltipPosition="top" >
                    <fa-icon [icon]="faPencil" size="sm"></fa-icon>
                </button>
            }

            @if(!isEditing && updated) {
                <!-- Restore original value-->
                <button 
                    class="edit_button" 
                    type="button"       
                    (click)="restoreOriginal()" 
                    aria-label="undo button" 
                    pTooltip="Undo changes"
                    tooltipPosition="top">
                    <fa-icon [icon]="faUndo" size="sm"></fa-icon>
                </button>
            }
        }
    </div>

    <div class="editor">
        @defer(when isListing) {
            <div style="width: 100%;" [@editExpanded]="editBlockExpanded" [style.overflow] = "overflowStyle">
                <lib-accesspage-list 
                    #accesspagelist 
                    [record]="record" 
                    [theme]="theme" 
                    [fieldName]="fieldName"
                    [mdupdsvc]="mdupdsvc"
                    (dataCommand)="onStatusChange($event); setChildEditMode($event)">
                </lib-accesspage-list>
            </div>
        }   
    </div>
</accesspage-pub>
